# TEST-02: E2E tests with Playwright
#
# Triggered by a successful Vercel deployment of the `staging` branch.
# Vercel's GitHub integration fires `deployment_status` for every preview
# deployment (feature branches and staging alike) and the event itself
# doesn't carry the branch name — `deployment.ref` is the commit SHA,
# `environment` is just "Preview", and `environment_url` is the auto-
# generated *.vercel.app URL (not the custom domain). So the `check-staging`
# job resolves the SHA → branch via the GitHub API, and only when the SHA
# is currently the HEAD of the `staging` branch does the `e2e` job run.
#
# App-level env vars (AUTH_SECRET, STRIPE_*, UPSTASH_*, ZOOM_*, etc.) are
# already present in the Vercel staging environment — they do NOT need to
# be passed from GitHub Actions. Only the secrets the test runner itself
# uses are listed here.
#
# ── Required GitHub secrets ───────────────────────────────────────────────────
#
#   E2E_BASE_URL
#   SUPABASE_URL_TEST             https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY_TEST
#   SUPABASE_DB_URL_TEST          (postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres)
#                                 Settings → Database → Connection pooling → Session mode
#   GOOGLE_CALENDAR_ID            test calendar (not the production one)
#   GOOGLE_SERVICE_ACCOUNT_EMAIL
#   GOOGLE_PRIVATE_KEY
#
# ── Vercel staging env vars (set in Vercel dashboard, not here) ───────────────
#
#   E2E_MODE=true, E2E_EMAILS, AUTH_SECRET
#   STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_ID_PACK5, STRIPE_PRICE_ID_PACK10
#   STRIPE_PRICE_ID_SESSION_1H, STRIPE_PRICE_ID_SESSION_2H
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN
#   RESEND_API_KEY, ZOOM_VIDEO_SDK_KEY, ZOOM_VIDEO_SDK_SECRET
#   NEXT_PUBLIC_BASE_URL, CANCEL_SECRET, GEMINI_API_KEY, TUTOR_EMAIL
#   QSTASH_URL, QSTASH_TOKEN, QSTASH_CURRENT_SIGNING_KEY, QSTASH_NEXT_SIGNING_KEY
#   ADMIN_EMAILS, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

name: E2E tests

on:
  deployment_status:

jobs:
  check-staging:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    outputs:
      is_staging: ${{ steps.check.outputs.is_staging }}
    steps:
      - name: Resolve deployed SHA to branch
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IS_STAGING=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.event.deployment.sha }}/branches-where-head" \
            --jq 'any(.name == "staging")')
          echo "is_staging=$IS_STAGING" >> "$GITHUB_OUTPUT"
          echo "deployed SHA ${{ github.event.deployment.sha }} → staging HEAD? $IS_STAGING"

  e2e:
    needs: check-staging
    if: needs.check-staging.outputs.is_staging == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to test database
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL_TEST }}"

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL:          ${{ secrets.E2E_BASE_URL }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}
          SUPABASE_DB_URL:       ${{ secrets.SUPABASE_DB_URL_TEST }}
          GOOGLE_CALENDAR_ID:    ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY:    ${{ secrets.GOOGLE_PRIVATE_KEY }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
